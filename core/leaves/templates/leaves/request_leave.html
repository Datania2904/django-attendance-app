{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Request Leave</h1>
  <p class="page-subtitle">Submit your leave request for approval</p>
</div>

<div class="form-container">
  <form method="POST" class="leave-form" id="leaveForm">
    {% csrf_token %}
    
    <div class="form-section">
      <h3 class="section-title">Leave Details</h3>
      
      <div class="form-row">
        <div class="form-group">
          <label for="leaveType" class="form-label">Leave Type <span class="required">*</span></label>
          <select id="leaveType" name="leave_type" class="form-control" required>
            <option value="">-- Select Leave Type --</option>
            <option value="Sick">Sick Leave</option>
            <option value="Casual">Casual Leave</option>
            <option value="Earned">Earned Leave</option>
            <option value="Maternity">Maternity Leave</option>
            <option value="WFH">Work From Home</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="duration" class="form-label">Duration <span class="required">*</span></label>
          <select id="duration" name="duration" required class="form-control">
              <option value="">-- Select Duration --</option>
              <option value="full">Full Day</option>
              <option value="first_half">First Half </option>
              <option value="second_half">Second Half</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate" class="form-label">Start Date <span class="required">*</span></label>
          <input type="date" id="startDate" name="start_date" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="endDate" class="form-label">End Date <span class="required">*</span></label>
          <input type="date" id="endDate" name="end_date" class="form-control" required>
        </div>
      </div>

      <div class="form-group">
        <label for="reason" class="form-label">Reason for Leave <span class="required">*</span></label>
        <textarea id="reason" name="reason" class="form-control" rows="1" placeholder="Please provide a brief reason for your leave request..." required></textarea>
      </div>

      <!--<div class="form-group">
        <label for="attachment" class="form-label">Attachment (Optional)</label>
        <div class="file-upload">
          <input type="file" id="attachment" name="attachment" class="file-input" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
          <div class="file-upload-area">
            <i class="fas fa-cloud-upload-alt"></i>
            <div class="file-upload-text">
              <p class="file-upload-main">Drop your files here or click to upload</p>
              <p class="file-upload-sub">Supported: PDF, DOC, DOCX, JPG, PNG (Max 5MB)</p>
            </div>
          </div>
          <div id="fileName" class="file-name"></div>
        </div>
      </div>
    </div>-->

    <!-- Leave Summary -->
    <div class="form-section info-section">
      <h3 class="section-title">Leave Summary</h3>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">Requested Days:</span>
          <span class="summary-value" id="daysCount">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Available Balance:</span>
          <span class="summary-value">{{ profile.remaining_leaves }}</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Status:</span>
          <span class="summary-value status-pending">Pending Review</span>
        </div>
      </div>
    </div>

    

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Submit Request
      </button>
      <a href="{% url 'calendar' %}" class="btn btn-secondary">
        <i class="fas fa-times"></i> Cancel
      </a>
    </div>
  </form>
</div>

<style>
  .page-header {
    margin-bottom: 2rem;
  }

  .page-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0 0 0.5rem 0;
  }

  .page-subtitle {
    color: var(--text-light);
    margin: 0;
    font-size: 0.95rem;
  }

  .form-container {
    background: var(--bg-white);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 2rem;
    box-shadow: var(--shadow-sm);
    max-width: 700px;
  }

  .leave-form {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .form-section {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .form-section.info-section {
    background: rgba(99, 102, 241, 0.05);
    border: 1px solid rgba(99, 102, 241, 0.2);
    padding: 1.5rem;
    border-radius: 8px;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-dark);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  .form-label {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
  }

  .required {
    color: var(--danger);
    font-weight: 600;
  }

  .form-control {
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--text-dark);
    background: var(--bg-white);
    transition: all var(--transition-fast);
  }

  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  textarea.form-control {
    resize: vertical;
    min-height: 100px;
  }

  .file-upload {
    position: relative;
  }

  .file-input {
    display: none;
  }

  .file-upload-area {
    border: 2px dashed var(--border-color);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all var(--transition-fast);
    background: var(--hover-bg);
  }

  .file-upload:hover .file-upload-area {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.05);
  }

  .file-upload-area i {
    font-size: 2.5rem;
    color: var(--primary);
    margin-bottom: 1rem;
    display: block;
  }

  .file-upload-main {
    color: var(--text-dark);
    font-weight: 500;
    margin: 0 0 0.5rem 0;
  }

  .file-upload-sub {
    color: var(--text-light);
    font-size: 0.85rem;
    margin: 0;
  }

  .file-name {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--success);
    font-weight: 500;
    display: none;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1.5rem;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .summary-label {
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 500;
  }

  .summary-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
  }

  .status-pending {
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.85rem;
    display: inline-flex;
    width: fit-content;
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.875rem 2rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    transition: all var(--transition-fast);
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    flex: 1;
  }

  .btn-primary:hover {
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    transform: translateY(-2px);
  }

  .btn-secondary {
    background: var(--hover-bg);
    color: var(--text-dark);
    border: 1px solid var(--border-color);
    flex: 1;
  }

  .btn-secondary:hover {
    background: var(--border-color);
  }

  @media (max-width: 768px) {
    .form-container {
      padding: 1.5rem;
    }

    .form-row {
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .form-actions {
      flex-direction: column;
    }

    .btn {
      width: 100%;
    }

    .summary-grid {
      grid-template-columns: 1fr;
    }

    .page-title {
      font-size: 1.5rem;
    }
  }
</style>

<script>
  // File upload handling
  const fileUploadArea = document.querySelector('.file-upload-area');
  const fileInput = document.getElementById('attachment');
  const fileName = document.getElementById('fileName');

  fileUploadArea.addEventListener('click', () => fileInput.click());

  fileUploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    fileUploadArea.style.borderColor = 'var(--primary)';
  });

  fileUploadArea.addEventListener('dragleave', () => {
    fileUploadArea.style.borderColor = 'var(--border-color)';
  });

  fileUploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    updateFileName();
  });

  fileInput.addEventListener('change', updateFileName);

  function updateFileName() {
    if (fileInput.files.length > 0) {
      fileName.textContent = '✓ ' + fileInput.files[0].name;
      fileName.style.display = 'block';
    } else {
      fileName.style.display = 'none';
    }
  }

</script>
<script>
function calculateDays() {
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;
    const duration = document.getElementById("duration").value;
    const daysCountEl = document.getElementById("daysCount");

    if (!startDate || !endDate) {
        daysCountEl.textContent = "0";
        return;
    }

    const start = new Date(startDate);
    const end = new Date(endDate);

    if (end < start) {
        daysCountEl.textContent = "0";
        return;
    }

    // Difference in days (inclusive)
    let days = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;

    // Half-day logic
    if (duration === "first_half" || duration === "second_half") {
        days = 0.5;
    }

    daysCountEl.textContent = days;
}

// Event listeners
document.getElementById("startDate").addEventListener("change", calculateDays);
document.getElementById("endDate").addEventListener("change", calculateDays);
document.getElementById("duration").addEventListener("change", calculateDays);
</script>
{% endblock %}
