{% extends "base.html" %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">My Payslips</h1>
</div>

{% if payslips %}
<ul>
    {% for p in payslips %}
        <li>
            <a href="{{ p.file.url }}" target="_blank">
                {{ p.file.name|slice:"9:" }}
            </a>
            <small>({{ p.uploaded_at|date:"M Y" }})</small>
        </li>
    {% endfor %}
</ul>
{% else %}
<p>No payslips available.</p>
{% endif %}

<style> 
    .page-header {
    margin-bottom: 2rem;
  }
    .page-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0 0 0.5rem 0;
  }
</style>

{% endblock %}
